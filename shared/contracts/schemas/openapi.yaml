openapi: "3.1.0"
info:
  title: Lychee Ripe Gateway API
  version: "1.1.0"
  description: >
    External API served by the Go gateway. The gateway provides auth/rate-limit,
    forwards inference requests, and exposes business APIs for batch traceability.

servers:
  - url: http://localhost:9000
    description: Local gateway

paths:
  /healthz:
    get:
      operationId: gatewayHealth
      summary: Aggregated gateway and upstream health
      tags: [system]
      security: []
      responses:
        "200":
          description: All systems healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayHealthResponse"
        "503":
          description: Upstream degraded or unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GatewayHealthResponse"

  /v1/health:
    get:
      operationId: upstreamHealth
      summary: Upstream FastAPI health (proxied)
      tags: [v1]
      security: []
      responses:
        "200":
          description: Upstream health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /v1/auth/me:
    get:
      operationId: getCurrentPrincipal
      summary: Get the current authenticated principal
      description: In `auth.mode=oidc`, the Bearer access token presented to the gateway must include an `email` claim for first-time binding to a pre-provisioned local user.
      tags: [auth]
      security:
        - OpenIdConnect: []
      responses:
        "200":
          description: Current principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Principal"
        "401":
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/models/current:
    get:
      operationId: currentModel
      summary: Current loaded model info (proxied)
      tags: [v1]
      security:
        - OpenIdConnect: []
        - BearerAuth: []
      responses:
        "200":
          description: Model metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentModelResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Upstream unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/infer/image:
    post:
      operationId: inferImage
      summary: Single image inference (proxied)
      tags: [v1]
      security:
        - OpenIdConnect: []
        - BearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "200":
          description: Inference result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImageInferResponse"
        "400":
          description: Invalid image or request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: File too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Model not loaded or upstream unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/infer/stream:
    get:
      operationId: inferStream
      summary: WebSocket streaming inference (proxied)
      tags: [v1]
      security:
        - OpenIdConnect: []
        - BearerAuth: []
      description: >
        WebSocket endpoint. Send binary frames (image bytes) to receive per-frame
        detection results. Send text "close"/"stop"/"eos" to end. On disconnect,
        server sends a SessionSummary envelope.
      x-websocket-messages:
        - direction: server-to-client
          description: Per-frame inference envelope.
          schema:
            $ref: "#/components/schemas/StreamFrameEnvelope"
        - direction: server-to-client
          description: Session summary envelope sent when stream closes.
          schema:
            $ref: "#/components/schemas/StreamSummaryEnvelope"
        - direction: server-to-client
          description: Non-fatal processing error envelope.
          schema:
            $ref: "#/components/schemas/StreamErrorEnvelope"

  /v1/batches:
    post:
      operationId: createBatch
      summary: Create a harvest batch in database or blockchain trace mode
      tags: [batch]
      security:
        - OpenIdConnect: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchCreateRequest"
      responses:
        "201":
          description: Batch created successfully in the active trace mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "202":
          description: Batch accepted and saved, blockchain anchor pending
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "400":
          description: Invalid request or unripe confirmation missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Duplicated batch conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service unavailable or unrecoverable chain error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/batches/{batch_id}:
    get:
      operationId: getBatch
      summary: Get batch detail by batch id within the current trace mode
      tags: [batch]
      security:
        - OpenIdConnect: []
      parameters:
        - $ref: "#/components/parameters/BatchID"
      responses:
        "200":
          description: Batch detail visible in the current trace mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Batch"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Batch not found or not visible in the current trace mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/trace/{trace_code}:
    get:
      operationId: getPublicTrace
      summary: Public trace query for batches visible in the current trace mode
      tags: [trace]
      security: []
      parameters:
        - $ref: "#/components/parameters/TraceCode"
      responses:
        "200":
          description: Public trace data for the current trace mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TraceResponse"
        "404":
          description: Trace code not found or not visible in the current trace mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Blockchain verify service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/dashboard/overview:
    get:
      operationId: getDashboardOverview
      summary: Get dashboard aggregate metrics filtered by the current trace mode
      tags: [dashboard]
      security:
        - OpenIdConnect: []
      responses:
        "200":
          description: Dashboard overview scoped to the current trace mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOverviewResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/batches/reconcile:
    post:
      operationId: reconcileBatches
      summary: Trigger manual reconcile for pending blockchain anchor batches
      tags: [batch]
      security:
        - OpenIdConnect: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReconcileRequest"
      responses:
        "202":
          description: Reconcile accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReconcileResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden by policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: No requested pending batch found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Reconcile is not available in database mode
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: Reconcile service unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/orchards:
    get:
      operationId: listOrchards
      summary: List orchards
      tags: [admin]
      security:
        - OpenIdConnect: []
      parameters:
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
          description: Include archived orchards in the response.
      responses:
        "200":
          description: Orchard list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchardListResponse"
    post:
      operationId: createOrchard
      summary: Create orchard
      tags: [admin]
      security:
        - OpenIdConnect: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchardUpsertRequest"
      responses:
        "201":
          description: Orchard created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orchard"

  /v1/orchards/{orchard_id}:
    patch:
      operationId: updateOrchard
      summary: Update orchard
      tags: [admin]
      security:
        - OpenIdConnect: []
      parameters:
        - name: orchard_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrchardUpdateRequest"
      responses:
        "200":
          description: Orchard updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orchard"
    delete:
      operationId: archiveOrchard
      summary: Archive orchard
      tags: [admin]
      security:
        - OpenIdConnect: []
      parameters:
        - name: orchard_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Orchard archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Orchard"

  /v1/plots:
    get:
      operationId: listPlots
      summary: List plots
      tags: [admin]
      security:
        - OpenIdConnect: []
      parameters:
        - name: orchard_id
          in: query
          required: false
          schema:
            type: string
          description: Filter plots by orchard id.
        - name: include_archived
          in: query
          required: false
          schema:
            type: boolean
          description: Include archived plots in the response.
      responses:
        "200":
          description: Plot list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlotListResponse"
    post:
      operationId: createPlot
      summary: Create plot
      tags: [admin]
      security:
        - OpenIdConnect: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlotUpsertRequest"
      responses:
        "201":
          description: Plot created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"

  /v1/plots/{plot_id}:
    patch:
      operationId: updatePlot
      summary: Update plot
      tags: [admin]
      security:
        - OpenIdConnect: []
      parameters:
        - name: plot_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlotUpdateRequest"
      responses:
        "200":
          description: Plot updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"
    delete:
      operationId: archivePlot
      summary: Archive plot
      tags: [admin]
      security:
        - OpenIdConnect: []
      parameters:
        - name: plot_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Plot archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plot"

  /v1/admin/users:
    get:
      operationId: listUsers
      summary: List provisioned users
      tags: [admin]
      security:
        - OpenIdConnect: []
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
    post:
      operationId: createUser
      summary: Create provisioned user
      tags: [admin]
      security:
        - OpenIdConnect: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpsertRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /v1/admin/users/{user_id}:
    patch:
      operationId: updateUser
      summary: Update provisioned user
      tags: [admin]
      security:
        - OpenIdConnect: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpsertRequest"
      responses:
        "200":
          description: User updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

components:
  securitySchemes:
    OpenIdConnect:
      type: openIdConnect
      description: The gateway treats `email` in the presented access token as a hard requirement for first-time binding of a pre-provisioned user account.
      openIdConnectUrl: https://issuer.example.com/.well-known/openid-configuration
    BearerAuth:
      type: http
      scheme: bearer

  parameters:
    BatchID:
      name: batch_id
      in: path
      required: true
      schema:
        type: string
      description: Batch unique identifier.
    TraceCode:
      name: trace_code
      in: path
      required: true
      schema:
        type: string
      description: Public trace code.

  schemas:
    TraceMode:
      type: string
      enum: [database, blockchain]

    RipenessLabel:
      type: string
      enum: [green, half, red, young]

    HarvestSuggestion:
      type: string
      enum: [not_ready, partially_ready, ready, overripe_risk]

    BatchStatus:
      type: string
      enum: [stored, pending_anchor, anchored, anchor_failed]

    VerifyStatus:
      type: string
      enum: [pass, fail, pending, recorded]

    UnripeHandling:
      type: string
      enum: [sorted_out]

    Detection:
      type: object
      required: [bbox, class_name, ripeness, confidence]
      properties:
        bbox:
          type: array
          items:
            type: number
          minItems: 4
          maxItems: 4
        class_name:
          type: string
          enum: [lychee]
        ripeness:
          $ref: "#/components/schemas/RipenessLabel"
        confidence:
          type: number
          minimum: 0
          maximum: 1
        track_id:
          type: integer
          nullable: true

    FrameSummary:
      type: object
      properties:
        total:
          type: integer
        green:
          type: integer
        half:
          type: integer
        red:
          type: integer
        young:
          type: integer

    FrameResult:
      type: object
      required: [frame_index, timestamp_ms, detections, frame_summary]
      properties:
        frame_index:
          type: integer
          minimum: 0
        timestamp_ms:
          type: integer
          minimum: 0
        detections:
          type: array
          items:
            $ref: "#/components/schemas/Detection"
        frame_summary:
          $ref: "#/components/schemas/FrameSummary"

    RipenessRatio:
      type: object
      properties:
        green:
          type: number
        half:
          type: number
        red:
          type: number
        young:
          type: number

    SessionSummary:
      type: object
      properties:
        total_detected:
          type: integer
        ripeness_ratio:
          $ref: "#/components/schemas/RipenessRatio"
        harvest_suggestion:
          $ref: "#/components/schemas/HarvestSuggestion"

    ModelMeta:
      type: object
      required: [model_version, schema_version, adapter, loaded]
      properties:
        model_version:
          type: string
        schema_version:
          type: string
        adapter:
          type: string
        loaded:
          type: boolean

    HealthResponse:
      type: object
      required: [status, model]
      properties:
        status:
          type: string
        model:
          $ref: "#/components/schemas/ModelMeta"

    CurrentModelResponse:
      type: object
      required: [model_version, schema_version, adapter, loaded]
      properties:
        model_version:
          type: string
        schema_version:
          type: string
        adapter:
          type: string
        loaded:
          type: boolean

    ImageInferResponse:
      type: object
      required: [model_version, schema_version, inference_ms, result]
      properties:
        model_version:
          type: string
        schema_version:
          type: string
        inference_ms:
          type: number
        result:
          $ref: "#/components/schemas/FrameResult"

    StreamFrameEnvelope:
      type: object
      required: [type, model_version, schema_version, result]
      properties:
        type:
          type: string
          enum: [frame]
        model_version:
          type: string
        schema_version:
          type: string
        result:
          $ref: "#/components/schemas/FrameResult"

    StreamSummaryEnvelope:
      type: object
      required: [type, model_version, schema_version, summary]
      properties:
        type:
          type: string
          enum: [summary]
        model_version:
          type: string
        schema_version:
          type: string
        summary:
          $ref: "#/components/schemas/SessionSummary"

    StreamErrorEnvelope:
      type: object
      required: [type, detail]
      properties:
        type:
          type: string
          enum: [error]
        detail:
          type: string

    GatewayHealthResponse:
      type: object
      required: [status, gateway]
      properties:
        status:
          type: string
          enum: [ok, degraded]
        gateway:
          type: string
        upstream:
          $ref: "#/components/schemas/HealthResponse"
        error:
          type: string

    BatchSummaryInput:
      type: object
      required: [total, green, half, red, young]
      properties:
        total:
          type: integer
          minimum: 0
        green:
          type: integer
          minimum: 0
        half:
          type: integer
          minimum: 0
        red:
          type: integer
          minimum: 0
        young:
          type: integer
          minimum: 0

    BatchSummary:
      type: object
      description: >
        Aggregated ripeness summary. unripe_count = green + young.
        unripe_ratio = unripe_count / total (total > 0). Default threshold is 0.15.
      required: [total, green, half, red, young, unripe_count, unripe_ratio, unripe_handling]
      properties:
        total:
          type: integer
          minimum: 0
        green:
          type: integer
          minimum: 0
        half:
          type: integer
          minimum: 0
        red:
          type: integer
          minimum: 0
        young:
          type: integer
          minimum: 0
        unripe_count:
          type: integer
          minimum: 0
        unripe_ratio:
          type: number
          minimum: 0
          maximum: 1
        unripe_handling:
          $ref: "#/components/schemas/UnripeHandling"

    BatchCreateRequest:
      type: object
      required: [orchard_id, orchard_name, plot_id, harvested_at, summary]
      properties:
        orchard_id:
          type: string
        orchard_name:
          type: string
        plot_id:
          type: string
        plot_name:
          type: string
        harvested_at:
          type: string
          format: date-time
        summary:
          $ref: "#/components/schemas/BatchSummaryInput"
        note:
          type: string
        confirm_unripe:
          type: boolean
          default: false
          description: >
            Required to be true when unripe_ratio > 0.15 in order to create the batch.

    AnchorProof:
      type: object
      required: [tx_hash, block_number, chain_id, contract_address, anchor_hash, anchored_at]
      properties:
        tx_hash:
          type: string
        block_number:
          type: integer
          minimum: 0
        chain_id:
          type: string
        contract_address:
          type: string
        anchor_hash:
          type: string
        anchored_at:
          type: string
          format: date-time

    Batch:
      type: object
      required:
        [batch_id, trace_code, trace_mode, status, orchard_id, orchard_name, plot_id, harvested_at, summary, created_at]
      properties:
        batch_id:
          type: string
        trace_code:
          type: string
        trace_mode:
          $ref: "#/components/schemas/TraceMode"
        status:
          $ref: "#/components/schemas/BatchStatus"
        orchard_id:
          type: string
        orchard_name:
          type: string
        plot_id:
          type: string
        plot_name:
          type: string
          nullable: true
        harvested_at:
          type: string
          format: date-time
        summary:
          $ref: "#/components/schemas/BatchSummary"
        note:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        anchor_proof:
          oneOf:
            - $ref: "#/components/schemas/AnchorProof"
            - type: "null"

    TraceBatch:
      type: object
      required: [batch_id, trace_code, trace_mode, status, orchard_name, plot_name, harvested_at, summary, created_at]
      properties:
        batch_id:
          type: string
        trace_code:
          type: string
        trace_mode:
          $ref: "#/components/schemas/TraceMode"
        status:
          $ref: "#/components/schemas/BatchStatus"
        orchard_name:
          type: string
        plot_name:
          type: string
        harvested_at:
          type: string
          format: date-time
        summary:
          $ref: "#/components/schemas/BatchSummary"
        created_at:
          type: string
          format: date-time

    TraceVerifyResult:
      type: object
      required: [verify_status, reason]
      properties:
        verify_status:
          $ref: "#/components/schemas/VerifyStatus"
        reason:
          type: string

    TraceResponse:
      type: object
      required: [batch, verify_result]
      properties:
        batch:
          $ref: "#/components/schemas/TraceBatch"
        verify_result:
          $ref: "#/components/schemas/TraceVerifyResult"

    DashboardTotals:
      type: object
      required: [batch_total]
      properties:
        batch_total:
          type: integer
          minimum: 0

    BatchStatusDistribution:
      type: object
      properties:
        stored:
          type: integer
          minimum: 0
        anchored:
          type: integer
          minimum: 0
        pending_anchor:
          type: integer
          minimum: 0
        anchor_failed:
          type: integer
          minimum: 0

    RipenessDistribution:
      type: object
      required: [green, half, red, young]
      properties:
        green:
          type: integer
          minimum: 0
        half:
          type: integer
          minimum: 0
        red:
          type: integer
          minimum: 0
        young:
          type: integer
          minimum: 0

    UnripeMetrics:
      type: object
      required: [unripe_batch_count, unripe_batch_ratio, threshold, unripe_handling]
      properties:
        unripe_batch_count:
          type: integer
          minimum: 0
        unripe_batch_ratio:
          type: number
          minimum: 0
          maximum: 1
        threshold:
          type: number
          minimum: 0
          maximum: 1
          default: 0.15
        unripe_handling:
          $ref: "#/components/schemas/UnripeHandling"

    RecentAnchorRecord:
      type: object
      required: [batch_id, trace_code, status, created_at]
      properties:
        batch_id:
          type: string
        trace_code:
          type: string
        status:
          $ref: "#/components/schemas/BatchStatus"
        tx_hash:
          type: string
          nullable: true
        anchored_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ReconcileStats:
      type: object
      required: [pending_count, retried_total, failed_total]
      properties:
        pending_count:
          type: integer
          minimum: 0
        retried_total:
          type: integer
          minimum: 0
        failed_total:
          type: integer
          minimum: 0
        last_reconcile_at:
          type: string
          format: date-time
          nullable: true

    DashboardOverviewResponse:
      type: object
      required:
        [trace_mode, totals, status_distribution, ripeness_distribution, unripe_metrics, recent_anchors]
      properties:
        trace_mode:
          $ref: "#/components/schemas/TraceMode"
        totals:
          $ref: "#/components/schemas/DashboardTotals"
        status_distribution:
          $ref: "#/components/schemas/BatchStatusDistribution"
        ripeness_distribution:
          $ref: "#/components/schemas/RipenessDistribution"
        unripe_metrics:
          $ref: "#/components/schemas/UnripeMetrics"
        recent_anchors:
          type: array
          items:
            $ref: "#/components/schemas/RecentAnchorRecord"
        reconcile_stats:
          oneOf:
            - $ref: "#/components/schemas/ReconcileStats"
            - type: "null"

    ReconcileRequest:
      type: object
      properties:
        batch_ids:
          type: array
          items:
            type: string
          description: >
            Optional explicit pending batch ids to reconcile.
            If omitted, the service selects pending batches by limit.
        limit:
          type: integer
          minimum: 1
          maximum: 1000
          default: 100

    ReconcileResponse:
      type: object
      required: [accepted, requested_count, scheduled_count, skipped_count]
      properties:
        accepted:
          type: boolean
        requested_count:
          type: integer
          minimum: 0
        scheduled_count:
          type: integer
          minimum: 0
        skipped_count:
          type: integer
          minimum: 0
        message:
          type: string

    AuthMode:
      type: string
      enum: [disabled, oidc]

    UserRole:
      type: string
      enum: [admin, operator]

    UserStatus:
      type: string
      enum: [active, disabled]

    ResourceStatus:
      type: string
      enum: [active, archived]

    Principal:
      type: object
      required: [subject, email, display_name, role, status, auth_mode, permissions]
      properties:
        subject:
          type: string
        email:
          type: string
        display_name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        auth_mode:
          $ref: "#/components/schemas/AuthMode"
        permissions:
          type: array
          items:
            type: string

    Orchard:
      type: object
      required: [orchard_id, orchard_name, status, created_at, updated_at]
      properties:
        orchard_id:
          type: string
        orchard_name:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Plot:
      type: object
      required: [plot_id, orchard_id, plot_name, status, created_at, updated_at]
      properties:
        plot_id:
          type: string
        orchard_id:
          type: string
        plot_name:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    User:
      type: object
      required: [id, email, display_name, role, status, created_at, updated_at]
      properties:
        id:
          type: string
        email:
          type: string
        display_name:
          type: string
        oidc_subject:
          type: string
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"
        last_login_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    OrchardListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Orchard"

    PlotListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Plot"

    UserListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"

    OrchardUpsertRequest:
      type: object
      required: [orchard_id, orchard_name]
      properties:
        orchard_id:
          type: string
        orchard_name:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"

    OrchardUpdateRequest:
      type: object
      required: [orchard_name, status]
      properties:
        orchard_name:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"

    PlotUpsertRequest:
      type: object
      required: [plot_id, orchard_id, plot_name]
      properties:
        plot_id:
          type: string
        orchard_id:
          type: string
        plot_name:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"

    PlotUpdateRequest:
      type: object
      required: [orchard_id, plot_name, status]
      properties:
        orchard_id:
          type: string
        plot_name:
          type: string
        status:
          $ref: "#/components/schemas/ResourceStatus"

    UserUpsertRequest:
      type: object
      required: [email, display_name, role, status]
      properties:
        email:
          type: string
        display_name:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        status:
          $ref: "#/components/schemas/UserStatus"

    ErrorResponse:
      type: object
      required: [error, message]
      properties:
