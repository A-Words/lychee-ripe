services:
  inference-api:
    build:
      context: .
      dockerfile: tooling/docker/Dockerfile.inference-api
    ports:
      - "8000:8000"
    environment:
      - LYCHEE_MODEL_CONFIG=tooling/configs/model.yaml
      - LYCHEE_SERVICE_CONFIG=tooling/configs/service.yaml
    volumes:
      - ./tooling/configs:/workspace/tooling/configs:ro
      - ./mlops:/workspace/mlops

  gateway:
    build:
      context: .
      dockerfile: tooling/docker/Dockerfile.gateway
    ports:
      - "9000:9000"
    environment:
      - LYCHEE_GATEWAY_CONFIG=/etc/gateway/gateway.compose.yaml
    volumes:
      - ./tooling/configs:/etc/gateway:ro
      - ./mlops/artifacts:/app/mlops/artifacts
    depends_on:
      - inference-api
