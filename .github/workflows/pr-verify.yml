name: PR Verify

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      LYCHEE_PY_TARGET: cpu
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Run verify
        run: |
          mkdir -p artifacts/logs
          set -o pipefail
          bun run verify | tee artifacts/logs/verify.log

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: verify-artifacts
          path: |
            artifacts/logs/verify.log
            .cache/pytest/inference-api-coverage.xml
            .cache/gateway-go-cover.out
            clients/orchard-console/coverage/lcov.info
          if-no-files-found: ignore
