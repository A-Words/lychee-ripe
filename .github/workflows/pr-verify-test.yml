name: PR Verify and Test

on:
  pull_request:
    branches:
      - main
    paths-ignore:
      - docs/**
      - '**/*.md'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      LYCHEE_PY_TARGET: cpu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Prepare CI artifacts directory
        run: mkdir -p artifacts/logs

      - name: Run verify
        run: |
          set -o pipefail
          bun run verify | tee artifacts/logs/verify.log

      - name: Upload verify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-artifacts
          path: artifacts/logs/verify.log
          if-no-files-found: ignore

  test:
    runs-on: ubuntu-latest
    env:
      LYCHEE_PY_TARGET: cpu
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup toolchain
        uses: ./.github/actions/setup-toolchain

      - name: Prepare CI artifacts directory
        run: mkdir -p artifacts/logs artifacts/coverage

      - name: Test gateway
        run: |
          set -o pipefail
          go test ./services/gateway/... -covermode=atomic -coverprofile=artifacts/coverage/gateway.out | tee artifacts/logs/gateway-test.log

      - name: Test inference-api
        working-directory: services/inference-api
        run: |
          set -o pipefail
          uv run --extra cpu python -m pytest \
            --cov=app --cov-report=term-missing \
            --cov-report=xml:../../artifacts/coverage/inference-api.xml \
            | tee ../../artifacts/logs/inference-api-test.log

      - name: Test orchard-console
        run: |
          set -o pipefail
          bun run --cwd clients/orchard-console test -- \
            --coverage --coverage.reporter=text --coverage.reporter=json \
            --coverage.reportsDirectory=../../artifacts/coverage/orchard-console \
            | tee artifacts/logs/orchard-console-test.log

      - name: Coverage summary
        if: always()
        run: |
          {
            echo "## Coverage"
            echo ""

            if [ -f artifacts/coverage/gateway.out ]; then
              total=$(go tool cover -func=artifacts/coverage/gateway.out | grep total | awk '{print $3}')
              echo "- **Gateway**: ${total}"
            else
              echo "- **Gateway**: not available"
            fi

            if [ -f artifacts/coverage/inference-api.xml ]; then
              rate=$(python3 -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('artifacts/coverage/inference-api.xml')
          print(f\"{float(tree.getroot().get('line-rate',0))*100:.1f}%\")
          " 2>/dev/null || echo "parse error")
              echo "- **Inference API**: ${rate}"
            else
              echo "- **Inference API**: not available"
            fi

            cov_json="artifacts/coverage/orchard-console/coverage-summary.json"
            if [ -f "$cov_json" ]; then
              pct=$(python3 -c "
          import json, sys, pathlib
          d = json.loads(pathlib.Path(sys.argv[1]).read_text())
          print(f\"{d['total']['lines']['pct']:.1f}%\")
          " "$cov_json" 2>/dev/null || echo "parse error")
              echo "- **Orchard Console**: ${pct}"
            else
              echo "- **Orchard Console**: not available"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            artifacts/logs/
            artifacts/coverage/
          if-no-files-found: ignore
